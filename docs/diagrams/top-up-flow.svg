<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 1500">
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="8" refY="4.5" orient="auto"><polygon points="0 0, 9 4.5, 0 9" fill="#5a5a5a"/></marker>
  </defs>
  <rect x="0" y="0" width="1280" height="1500" fill="#f8f6f3"/>
  <text x="640.0" y="44" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="22" font-weight="700" fill="#1a1a1a">Top-Up — System View</text>
  <text x="640.0" y="68" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="13" fill="#5a5a5a">how a request is resolved across services, and what continues asynchronously after the response</text>
  <rect x="40" y="90" width="14" height="14" rx="4" ry="4" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="62" y="102" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#1a1a1a">Investment-Wallet</text>
  <rect x="220" y="90" width="14" height="14" rx="4" ry="4" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="242" y="102" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#1a1a1a">Payment-Gateway</text>
  <rect x="400" y="90" width="14" height="14" rx="4" ry="4" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="422" y="102" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#1a1a1a">Provider (mock)</text>
  <rect x="580" y="90" width="14" height="14" rx="4" ry="4" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="602" y="102" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#1a1a1a">Omnibus</text>
  <rect x="760" y="90" width="14" height="14" rx="4" ry="4" fill="#e9d8c4" stroke="#4a4a4a" stroke-width="1.5"/>
  <text x="782" y="102" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#1a1a1a">RabbitMQ</text>
  <circle cx="640.0" cy="140" r="10" fill="#1a1a1a"/>
  <rect x="540" y="170" width="200" height="64" rx="12" ry="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="640.0" y="200" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">Request enters Wallet</text>
  <text x="640.0" y="220" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">POST /top-ups + Idempotency-Key</text>
  <line x1="640.0" y1="150" x2="640.0" y2="168" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="540" y="264" width="200" height="80" rx="12" ry="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="640.0" y="294" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">Idempotency claim</text>
  <text x="640.0" y="314" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">+ insert top_up PENDING</text>
  <text x="640.0" y="332" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">(one DB transaction)</text>
  <line x1="640.0" y1="234" x2="640.0" y2="262" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="540" y="374" width="200" height="64" rx="12" ry="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="640.0" y="404" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">Call Payment-Gateway</text>
  <text x="640.0" y="424" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">POST /charges (sync HTTP)</text>
  <line x1="640.0" y1="344" x2="640.0" y2="372" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="540" y="468" width="200" height="80" rx="12" ry="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="640.0" y="498" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">Idempotency claim</text>
  <text x="640.0" y="518" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">+ insert charge CREATED</text>
  <text x="640.0" y="536" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">(one DB transaction)</text>
  <line x1="640.0" y1="438" x2="640.0" y2="466" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="540" y="578" width="200" height="64" rx="12" ry="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="640.0" y="608" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">Call mock provider</text>
  <text x="640.0" y="628" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">create payment</text>
  <line x1="640.0" y1="548" x2="640.0" y2="576" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="480" y="672" width="320" height="84" rx="12" ry="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="640.0" y="702" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">Provider:  schedule webhook  +  return payment_id</text>
  <text x="640.0" y="722" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">asyncio.create_task fires the webhook ~1s later (fire-and-forget)</text>
  <text x="640.0" y="740" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">sync caller does not wait</text>
  <line x1="640.0" y1="642" x2="640.0" y2="670" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="180" y="790" width="920" height="6" fill="#1a1a1a"/>
  <line x1="640.0" y1="756" x2="640.0" y2="790" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="190" y="780" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" font-style="italic" fill="#5a5a5a">fork: synchronous response unwinds upward; settlement continues asynchronously</text>
  <rect x="110" y="830" width="240" height="70" rx="12" ry="12" fill="#a8c5e6" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="230.0" y="860" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">PG: charge ACCEPTED</text>
  <text x="230.0" y="880" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">return to Wallet</text>
  <line x1="230.0" y1="796" x2="230.0" y2="828" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="110" y="928" width="240" height="70" rx="12" ry="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="230.0" y="958" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">State guard</text>
  <text x="230.0" y="978" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">PENDING → PROCESSING</text>
  <line x1="230.0" y1="900" x2="230.0" y2="926" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="110" y="1026" width="240" height="70" rx="12" ry="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="230.0" y="1056" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">Return 200 PROCESSING</text>
  <text x="230.0" y="1076" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">client receives top_up_id</text>
  <line x1="230.0" y1="996" x2="230.0" y2="1024" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <circle cx="230.0" cy="1140" r="14" fill="none" stroke="#4a4a4a" stroke-width="2.5"/>
  <circle cx="230.0" cy="1140" r="8" fill="#1a1a1a"/>
  <line x1="230.0" y1="1096" x2="230.0" y2="1126" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="230.0" y="1170" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" font-style="italic" fill="#5a5a5a">client has 200; sync done</text>
  <rect x="880" y="830" width="280" height="78" rx="12" ry="12" fill="#f4e4c1" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="1020.0" y="860" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">Provider fires signed webhook</text>
  <text x="1020.0" y="880" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">to Omnibus  (HMAC-SHA256)</text>
  <line x1="1020.0" y1="796" x2="1020.0" y2="828" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="880" y="936" width="280" height="96" rx="12" ry="12" fill="#e8e6e3" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="1020.0" y="966" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">Omnibus</text>
  <text x="1020.0" y="986" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">verify signature → dedup event_id →</text>
  <text x="1020.0" y="1004" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">insert statement + outbox event</text>
  <text x="1020.0" y="1022" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">(one DB transaction)</text>
  <line x1="1020.0" y1="908" x2="1020.0" y2="934" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="880" y="1060" width="280" height="60" rx="12" ry="12" fill="#e9d8c4" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="1020.0" y="1090" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">Outbox drain → RabbitMQ</text>
  <text x="1020.0" y="1110" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">publish settlement.completed</text>
  <line x1="1020.0" y1="1032" x2="1020.0" y2="1058" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="880" y="1148" width="280" height="96" rx="12" ry="12" fill="#9dd4c7" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="1020.0" y="1178" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">Wallet consumer</text>
  <text x="1020.0" y="1198" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">dedup event → state guard PROCESSING → PAID</text>
  <text x="1020.0" y="1216" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">credit wallet balance + outbox top_up.paid</text>
  <text x="1020.0" y="1234" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">(one DB transaction)</text>
  <line x1="1020.0" y1="1120" x2="1020.0" y2="1146" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="880" y="1272" width="280" height="60" rx="12" ry="12" fill="#e9d8c4" stroke="#4a4a4a" stroke-width="2.5"/>
  <text x="1020.0" y="1302" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="14" font-weight="600" fill="#1a1a1a">Outbox drain → RabbitMQ</text>
  <text x="1020.0" y="1322" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" fill="#5a5a5a">publish top_up.paid</text>
  <line x1="1020.0" y1="1244" x2="1020.0" y2="1270" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <circle cx="1020.0" cy="1370" r="14" fill="none" stroke="#4a4a4a" stroke-width="2.5"/>
  <circle cx="1020.0" cy="1370" r="8" fill="#1a1a1a"/>
  <line x1="1020.0" y1="1332" x2="1020.0" y2="1356" stroke="#5a5a5a" stroke-width="2" marker-end="url(#arr)"/>
  <text x="1020.0" y="1400" text-anchor="middle" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="12" font-style="italic" fill="#5a5a5a">terminal: top_up PAID, balance credited</text>
</svg>