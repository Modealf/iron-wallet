  <text x="774" y="190" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="11" font-weight="700" fill="#5a5a5a">ENDPOINT</text>
  <text x="778" y="204" font-family="'SF Mono', 'Menlo', 'Consolas', monospace" font-size="11.5" fill="#1a1a1a">POST /charges</text>
